version: '3.8'
services:
  crm-backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: always
    ports: ["3001:3001"]
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - UPSTASH_REDIS_TLS_URL=${UPSTASH_REDIS_TLS_URL}
      - UAZAPI_BASE_URL=${UAZAPI_BASE_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - WEBHOOK_PUBLIC_URL=${WEBHOOK_PUBLIC_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-crm-media}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - FFMPEG_PATH=/usr/bin/ffmpeg
    networks: [crm-network]
    deploy:
      resources:
        limits: { memory: 2G, cpus: '0.8' }
        reservations: { memory: 1G }

  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: always
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [crm-backend]
    networks: [crm-network]

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    ports: ["3002:3001"]
    volumes: [uptime_data:/app/data]
    networks: [crm-network]

volumes:
  uptime_data:

networks:
  crm-network:
    driver: bridge
